<!doctype html>
<html><head><meta charset="utf-8"><style>
  body{font:13px -apple-system,Segoe UI,Roboto,sans-serif;width:300px;padding:14px;color:#1f2433;margin:0}
  .row{display:flex;align-items:center;gap:8px}
  .logo{width:28px;height:28px;border-radius:8px;background:#5b5bd6;color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}
  h1{font-size:15px;margin:0} .sub{color:#6b7280;margin:2px 0 12px;font-size:12px}
  label{display:block;font-weight:600;margin:8px 0 3px}
  input{width:100%;padding:7px;border:1px solid #e3e6ef;border-radius:8px;box-sizing:border-box;font-size:13px}
  button{margin-top:12px;width:100%;padding:9px;background:#5b5bd6;color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
  button:hover{background:#4f46e5}
  .ok{color:#0f7b3b;font-size:12px;margin-top:8px;min-height:14px}
  .hint{color:#6b7280;font-size:11px;margin-top:10px;line-height:1.4} a{color:#4f46e5}
</style></head><body>
  <div class="row"><div class="logo">GK</div><div><h1>GitKosh Sync</h1></div></div>
  <p class="sub">Real-time LeetCode → GitHub</p>
  <label>GitHub token (PAT)</label>
  <input id="token" type="password" placeholder="github_pat_… or ghp_…">
  <label>Repo (owner/name or just name)</label>
  <input id="repo" placeholder="competitive-programming">
  <button id="save">Save</button>
  <div class="ok" id="status"></div>
  <p class="hint">Create a fine-grained token with <b>Contents: Read and write</b> on your
  solutions repo at <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a>,
  paste it above, then just solve on LeetCode — accepted submissions push automatically.</p>
  <script src="popup.js"></script>
</body></html>
